# ── devops-setup ──────────────────────────────────────────────────────────────
# "Shippable" = the scripts are sound and the service actually comes up healthy.
# shellcheck :: shellcheck scripts/*.sh
# syntax     :: bash -n scripts/*.sh
# smoke      :: scripts/smoke.sh        # service comes up healthy + reachable (write this)
# Security: the exposed surface and the committed config, checked mechanically.
# secrets    :: ./scripts/secret-scan.sh --all  # R8 — no credential in compose/env/CI YAML
# image      :: trivy image --severity HIGH,CRITICAL --exit-code 1 <your-image>
# ports      :: scripts/check-exposed-ports.sh  # only intended ports listen (write this)
