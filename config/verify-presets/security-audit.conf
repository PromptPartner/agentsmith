# ── security-audit ────────────────────────────────────────────────────────────
# "Shippable" = every finding was reproduced, the report carries no live credential,
# and the sources you cited still resolve. Reproduction is the gate — a finding that
# only a scanner has ever seen is a lead, not a finding.
# repro   :: scripts/repro-findings.sh   # re-runs each finding's repro steps (write this)
# secrets :: ./scripts/secret-scan.sh --all  # R8 — the report itself quotes no live secret
# links   :: npx linkinator findings --silent  # cited CVE/advisory URLs still resolve
