# ── data-crunching · Tideline (churn analysis) ────────────────────────────────
# "Shippable" = schema holds, row counts reconcile (inputs == outputs + explained drops), notebook runs clean.
# Phases run top-to-bottom; the FIRST failure stops the run (fix it, re-run — don't skip ahead).
schema    :: python scripts/check_schema.py data/processed/churn.parquet
reconcile :: python scripts/reconcile_rows.py
notebook  :: jupyter nbconvert --to notebook --execute notebooks/churn.ipynb --output /tmp/out.ipynb
