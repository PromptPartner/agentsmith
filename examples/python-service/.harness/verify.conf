# ── software-dev · Orchard (FastAPI) ──────────────────────────────────────────
# "Shippable" = it formats clean, lints clean, types check, migrations are current, tests pass.
# Phases run top-to-bottom; the FIRST failure stops the run (fix it, re-run — don't skip ahead).
format     :: ruff format --check .
lint       :: ruff check .
types      :: mypy app
migrations :: alembic check
test       :: pytest -q
