# ── devops-setup · Harbor (Compose + Caddy) ───────────────────────────────────
# "Shippable" = the scripts are sound and the service actually comes up healthy + reachable.
# Phases run top-to-bottom; the FIRST failure stops the run (fix it, re-run — don't skip ahead).
shellcheck :: shellcheck install.sh scripts/smoke.sh
compose    :: docker compose config -q
smoke      :: bash scripts/smoke.sh
