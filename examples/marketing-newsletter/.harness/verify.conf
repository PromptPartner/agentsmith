# ── marketing-outreach · Dispatch (weekly newsletter & outreach) ──────────────
# "Shippable" = copy is clean and links work. The actual SEND is gated by HUMAN APPROVAL —
# no phase here sends or publishes; verify proves the draft is ready, then a human hits send.
# Phases run top-to-bottom; the FIRST failure stops the run (fix it, re-run — don't skip ahead).
spell    :: npx cspell "drafts/**/*.md"
links    :: npx lychee --no-progress "drafts/**/*.md"
testsend :: echo "MANUAL GATE: send a test to your own seed inbox and eyeball it (desktop + mobile, merge tokens, links) before any broadcast"
