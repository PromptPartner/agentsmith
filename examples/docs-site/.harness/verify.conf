# ── document-creation · Lumen Docs (Astro Starlight) ──────────────────────────
# "Shippable" = it spells right, links resolve, and the RENDERED page looks correct (eyeball it).
# Phases run top-to-bottom; the FIRST failure stops the run (fix it, re-run — don't skip ahead).
spell :: npx cspell "src/content/**/*.{md,mdx}"
links :: npx lychee --no-progress "src/content/**/*.md"
build :: npm run build
