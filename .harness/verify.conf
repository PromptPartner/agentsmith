# .harness/verify.conf — phases for scripts/verify.sh, for the agentsmith repo ITSELF.
# (User projects get their own generated file from config/verify-presets/ — setup.sh builds it
# fresh via build_verify_conf and never copies this one.)
#
# "Shippable" here = the shipped scripts parse, the R8 guardrail still catches secrets fast enough
# to survive as a pre-commit hook, every profile still assembles into rules an agent can actually
# follow (this repo's whole output is an assembled CLAUDE.md — if assembly silently half-renders,
# the agent doesn't crash, it follows wrong rules), and the shipped surface still belongs to
# nobody in particular (this harness installs on other people's machines).
#
# These same phases run in CI on every push/PR (.github/workflows/verify.yml), so "green locally"
# and "green in CI" mean the identical thing. Add a phase here and CI picks it up for free.

syntax     :: bash -n setup.sh && for f in scripts/*.sh hooks/*.sh hooks/git/*.sh; do bash -n "$f" || exit 1; done
secret-scan :: bash scripts/test-secret-scan.sh
leak-gate  :: bash scripts/test-leak-gate.sh
identity   :: bash scripts/test-operator-identity.sh
assemble   :: bash scripts/test-assemble.sh
consent    :: bash scripts/test-tracker-consent.sh
ui-design-hook :: bash scripts/test-ui-design-reminder.sh
